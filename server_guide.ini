⚠️ NHƯNG KHOAN ĐÃ - CÓ MỘT CÁI BẪY CHẾT NGƯỜI Ở ĐÂY!
Nếu bác chỉ gõ node_modules/next/dist/bin/next, đôi khi Passenger sẽ bị ngáo và khởi động Next.js ở chế độ... Dev Mode (chạy cực kỳ chậm và lỗi). Vì nó thiếu mất cái chữ start trong lệnh next start.

👉 CÁCH GIẢI QUYẾT CHUYÊN NGHIỆP NHẤT (Chuẩn Enterprise):
Đừng dùng cái đường dẫn bin/next kia. Thay vào đó, bác tạo một file mới tinh tên là server.js ngay tại thư mục /httpdocs, với nội dung "mồi lửa" sau:

  JavaScript
  // File: server.js
  const { createServer } = require('http')
  const { parse } = require('url')
  const next = require('next')

  const dev = process.env.NODE_ENV !== 'production'
  const app = next({ dev })
  const handle = app.getRequestHandler()

  app.prepare().then(() => {
    createServer((req, res) => {
      const parsedUrl = parse(req.url, true)
      handle(req, res, parsedUrl)
    }).listen(process.env.PORT || 3000, (err) => {
      if (err) throw err
      console.log('> Ready on http://localhost:3000')
    })
  })
  Sau đó, trong Plesk, mục Application Startup File, bác chỉ cần điền là: server.js.
Lúc này Passenger sẽ đọc file này, khởi động Next.js ở mode Production mượt mà 100%.