# Local stack: MySQL + API. Override env in `backend/.env` or use `environment:` below.
#
#   docker compose up -d --build
#
# API is exposed on host port ${API_HOST_PORT:-5001} (match `BACKEND_PORT` in `frontend/.env.local`).

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vuleits_db}
      MYSQL_USER: ${MYSQL_USER:-vuleits}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: ${API_IMAGE:-vuleits-backend:local}
    restart: unless-stopped
    ports:
      - "${API_HOST_PORT:-5001}:5001"
    environment:
      NODE_ENV: production
      PORT: "5001"
      DATABASE_URL: ${DATABASE_URL:-mysql://${MYSQL_USER:-vuleits}:${MYSQL_PASSWORD:-changeme}@mysql:3306/${MYSQL_DATABASE:-vuleits_db}}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
